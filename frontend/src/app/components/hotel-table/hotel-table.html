<table mat-table [dataSource]="rows" class="hotels-table">
	<ng-container matColumnDef="name">
		<th mat-header-cell *matHeaderCellDef>Name</th>
		<td mat-cell *matCellDef="let row">{{ row.name }}</td>
	</ng-container>

	<ng-container matColumnDef="currentPrice">
		<th mat-header-cell *matHeaderCellDef>Current Price</th>
		<td mat-cell *matCellDef="let row">{{ row.currentPrice ?? 0 | currency: 'USD' }}</td>
	</ng-container>

	<ng-container matColumnDef="source">
		<th mat-header-cell *matHeaderCellDef>Data Source</th>
		<td mat-cell *matCellDef="let row">{{ row.currentPriceSource }}</td>
	</ng-container>

	<ng-container matColumnDef="averagePrice">
		<th mat-header-cell *matHeaderCellDef>Average Price</th>
		<td mat-cell *matCellDef="let row">{{ row.averagePrice ?? 0 | currency: 'USD' }}</td>
	</ng-container>

	<ng-container matColumnDef="score">
		<th mat-header-cell *matHeaderCellDef>Score</th>
		<td mat-cell *matCellDef="let row">{{ row.score ?? 0 | number: '1.2-2' }}</td>
	</ng-container>

	<ng-container matColumnDef="trend">
		<th mat-header-cell *matHeaderCellDef>Trend</th>
		<td mat-cell *matCellDef="let row">{{ row.trend }}</td>
	</ng-container>

	<ng-container matColumnDef="detail">
		<th mat-header-cell *matHeaderCellDef></th>
		<td mat-cell *matCellDef="let row">
			<a mat-stroked-button [routerLink]="['/hotels', row.id]">View</a>
		</td>
	</ng-container>

	<tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
	<tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>
