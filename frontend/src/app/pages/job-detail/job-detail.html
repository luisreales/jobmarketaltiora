<section class="min-h-[100dvh] bg-slate-100 p-4 md:p-8">
  <div class="mx-auto w-full max-w-4xl space-y-6">

    <!-- Back -->
    <div>
      <a
        [queryParams]="backLinkQueryParams"
        [routerLink]="backLinkPath"
        class="inline-flex items-center gap-1.5 text-sm font-medium text-slate-500 transition hover:text-slate-800">
        <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        {{ backLinkLabel }}
      </a>
    </div>

    @if (loading) {
      <div class="rounded-2xl bg-white p-10 text-center text-sm text-slate-400 shadow-sm">
        Loading job detail...
      </div>
    } @else if (!job) {
      <div class="rounded-2xl border border-red-200 bg-red-50 p-8 text-center shadow-sm">
        <p class="text-sm font-semibold text-red-700">Job not found.</p>
        <a routerLink="/jobs" class="mt-2 inline-block text-xs text-blue-600 hover:underline">← Back to Jobs</a>
      </div>
    } @else {
      <app-job-detail-card [job]="job"></app-job-detail-card>
    }

  </div>
</section>
