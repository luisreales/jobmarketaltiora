<section class="panel">
	<div class="header-row">
		<h2>Jobs Guardadas (LinkedIn + Upwork)</h2>
		<button type="button" (click)="reloadCurrentQuery()">Refrescar</button>
	</div>
	<p>Filtros, ordenacion y paginacion se procesan en backend para mejorar rendimiento.</p>

	<p *ngIf="loading">Cargando vacantes...</p>

	<app-jobs-table
		[jobs]="jobs"
		[totalCount]="totalCount"
		[loading]="loading"
		(queryChange)="refresh($event)">
	</app-jobs-table>
</section>
