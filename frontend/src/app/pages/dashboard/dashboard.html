<section class="panel">
	<div class="header-row">
		<h2>LinkedIn Jobs Guardadas</h2>
		<button type="button" (click)="refresh()">Refrescar</button>
	</div>
	<p>Todas las vacantes capturadas y almacenadas por el backend.</p>

	<p *ngIf="loading">Cargando vacantes...</p>
	<p *ngIf="!loading && !jobs.length">No hay vacantes guardadas todavía.</p>

	<app-jobs-table *ngIf="jobs.length" [jobs]="jobs"></app-jobs-table>
</section>
