services:
  postgres:
    image: postgres:16
    container_name: jobmarketaltiora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobmarketaltiora_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobmarketaltiora_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobmarketaltiora-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      scraper-api:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=jobmarketaltiora_db;Username=postgres;Password=postgres
      Jobs__Playwright__LoginHeadless: "true"
      Jobs__Credentials__LinkedIn__Username: ${LINKEDIN_USERNAME}
      Jobs__Credentials__LinkedIn__Password: ${LINKEDIN_PASSWORD}
      Jobs__Credentials__Upwork__Username: ${UPWORK_USERNAME}
      Jobs__Credentials__Upwork__Password: ${UPWORK_PASSWORD}
      SemanticKernel__Enabled: ${SEMANTIC_KERNEL_ENABLED:-true}
      SemanticKernel__Provider: ${SEMANTIC_KERNEL_PROVIDER:-OpenAI}
      SemanticKernel__ModelId: ${SEMANTIC_KERNEL_MODEL_ID:-gpt5}
      SemanticKernel__Endpoint: ${SEMANTIC_KERNEL_ENDPOINT:-https://flow.ciandt.com/flow-llm-proxy/v1}
      SemanticKernel__ApiKeys__OpenAI: ${FLOW_API_KEY}
      SemanticKernel__ApiKey: ${FLOW_API_KEY}
      Jobs__MarketIntelligence__UseSemanticKernel: ${JOBS_MARKET_USE_SEMANTIC_KERNEL:-true}
      Jobs__MarketIntelligence__SamplingRatePercent: ${JOBS_MARKET_SAMPLING_RATE_PERCENT:-100}
      Jobs__MarketIntelligence__MinDescriptionLength: ${JOBS_MARKET_MIN_DESCRIPTION_LENGTH:-1}
      Jobs__MarketIntelligence__MaxCallsPerDay: ${JOBS_MARKET_MAX_CALLS_PER_DAY:-10000}
      Jobs__MarketIntelligence__PromptVersion: ${JOBS_MARKET_PROMPT_VERSION:-v1}
      Jobs__MarketIntelligence__PromptTemplate: ${JOBS_MARKET_PROMPT_TEMPLATE}
      UpworkScraper__BaseUrl: ${UPWORK_SCRAPER_BASE_URL:-http://scraper-api:3000}
      UpworkScraper__TimeoutSeconds: "900"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/playwright-state:/app/playwright-state
      - ./backend/data:/app/data

  scraper-api:
    build:
      context: ./scraper-api
      dockerfile: Dockerfile
    container_name: jobmarketaltiora-scraper-api
    restart: unless-stopped
    shm_size: '2gb'
    environment:
      UPWORK_HEADLESS: "true"
      MANUAL_LOGIN_TIMEOUT_SECONDS: "300"
      UPWORK_FORCE_MANUAL_LOGIN: "false"
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobmarketaltiora-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "4200:80"

volumes:
  pgdata:
